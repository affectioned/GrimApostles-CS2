name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild "GrimApostles CS2.sln" /p:Configuration=Release /p:Platform=x64 /m /nologo

      - name: Set version tag
        id: version
        shell: bash
        run: echo "tag=build-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: bin/Release/GrimApostles CS2.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
